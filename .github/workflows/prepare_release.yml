name: PrepareRelease

# Connected workflows are:
# 1. 📍PrepareRelease    - prepare_release.yml
# 2. FinalizeRelease     - finalize_release.yml
# 3. PublishToESOUI      - publish_to_esoui.yml
# Refer to CONTRIBUTING.md for more info.

# Prepares a release:
# - bumps version
# - regenerates autocomplete
# - regenerates translation files
# - formats with StyLUA
# - updates CHANGELOG
# - opens `release/<version>` PR against master
# Merging that PR triggers FinalizeRelease, which:
# - tags version
# - attaches packaged addon to a GitHub release
# - starts PublishToESOUI (3) automatically

permissions:
  contents: write
  pull-requests: write

on:
  workflow_dispatch:
    inputs:
      # Bump examples: patch 1.2.3->1.2.4, minor 1.2.3->1.3.0, major 1.2.3->2.0.0
      impact:
        description: 'Version bump relative to live ESOUI version (ex. minor 1.2.3->1.3.0)'
        type: choice
        options: [major, minor, patch]
        default: minor
      # Workaround for GitHub actions having no multi-line input
      # If more lines needed, you can edit CHANGELOG in the PR
      # Empty ignored, all empty = no relevant change this release
      notes1:
        description: 'Changelog, optional, one line per field: LINE 1 ...'
        type: string
        default: ''
      notes2:
        description: '... 2 ...'
        type: string
        default: ''
      notes3:
        description: '... 3 ...'
        type: string
        default: ''
      notes4:
        description: '... 4 ...'
        type: string
        default: ''
      notes5:
        description: '... 5 ...'
        type: string
        default: ''
      notes6:
        description: '... 6 ...'
        type: string
        default: ''
      notes7:
        description: '... 7'
        type: string
        default: ''
      dry_run:
        description: 'Dry run: compute everything, upload a diff artifact, do not push or open a PR.'
        type: boolean
        default: false

jobs:
  prepare:
    runs-on: ubuntu-latest
    steps:
      # Master can drift from web-edits and pushes. Must get latest
      - name: Checkout master
        uses: actions/checkout@v6
        with:
          ref: master
          fetch-depth: 0

      - uses: ./.github/actions/configure-bot
      - uses: ./.github/actions/setup-python-env
      - uses: ./.github/actions/setup-stylua

      # Pre-flight: catch only what the workflow cannot fix automatically.
      #   - Manifest validate: header fields (Title / Version / APIVersion) must parse
      #   - Package dry-run: zip builds and is non-empty.
      - name: Pre-flight - Manifest validate
        run: python .scripts/furc_utils.py validatemanifest FurnitureCatalogue.txt
      - name: Pre-flight - Package dry-run
        run: |
          python .scripts/package.py
          # zip path is <Title>-<Version>.zip per package.py, check it exists + is non-empty
          ZIP="$(ls -1 *.zip | head -1)"
          test -n "$ZIP" && test -s "$ZIP" || { echo "package.py produced no zip"; exit 1; }
          unzip -l "$ZIP" >/dev/null
          rm -f "$ZIP"  # this is a dry-run; the real zip is built by FinalizeRelease

      # Resolve LIVE version from ESOUI, derive NEXT from inputs.impact.
      - name: Resolve target version
        id: version
        env:
          ESOUI_API_TOKEN: ${{ secrets.ESOUI_API_TOKEN }}
        run: |
          LIVE="$(python .scripts/esoui_utils.py version)"
          case "${{ inputs.impact }}" in
            major) FLAG="--major" ;;
            patch) FLAG="--patch" ;;
            *)     FLAG="" ;;
          esac
          # shellcheck disable=SC2086
          NEXT="$(python .scripts/furc_utils.py nextversion --current "$LIVE" $FLAG)"
          # Refuse to skip more than 1 step over live ESOUI version
          python .scripts/furc_utils.py checkincrement --current "$LIVE" --next "$NEXT"
          echo "LIVE=$LIVE" >> "$GITHUB_OUTPUT"
          echo "NEXT=$NEXT" >> "$GITHUB_OUTPUT"
          echo "Live on ESOUI: $LIVE -> Next: $NEXT"

      # refuse if target tag already exists (locally or remote). Stops a re-trigger.
      - name: Check tag does not exist
        run: |
          NEXT="${{ steps.version.outputs.NEXT }}"
          if git rev-parse -q --verify "refs/tags/$NEXT" >/dev/null; then
            echo "🔥 Tag $NEXT already exists locally. Aborting." >&2
            exit 1
          fi
          if git ls-remote --exit-code --tags origin "refs/tags/$NEXT" >/dev/null 2>&1; then
            echo "🔥 Tag $NEXT already exists on origin. Aborting." >&2
            exit 1
          fi

      # All changes happen on release/$NEXT. Even in dry-run we make changes locally so we can produce a real diff artifact.
      - name: Create release branch
        id: branch
        run: |
          BRANCH="release/${{ steps.version.outputs.NEXT }}"
          # Wipe any leftover local/remote branch with the same name from a prior aborted run.
          git branch -D "$BRANCH" 2>/dev/null || true
          if [[ "${{ inputs.dry_run }}" != "true" ]]; then
            git push origin --delete "$BRANCH" 2>/dev/null || true
          fi
          git checkout -b "$BRANCH"
          echo "BRANCH=$BRANCH" >> "$GITHUB_OUTPUT"

      # ------ Mutation block --------
      # Everything below writes files in working tree
      # ------------------------------

      - name: Bump version (FurnitureCatalogue.txt + startup.lua)
        id: bump
        run: |
          VERSION="${{ steps.version.outputs.NEXT }}"
          CHANGED="changed_${VERSION}.tmp"
          python .scripts/furc_utils.py changeversion --new-version "$VERSION" --output-file "$CHANGED"
          echo "CHANGED_FILES=$CHANGED" >> "$GITHUB_OUTPUT"

      - name: Assemble release notes
        id: notes
        env:
          N1: ${{ inputs.notes1 }}
          N2: ${{ inputs.notes2 }}
          N3: ${{ inputs.notes3 }}
          N4: ${{ inputs.notes4 }}
          N5: ${{ inputs.notes5 }}
          N6: ${{ inputs.notes6 }}
          N7: ${{ inputs.notes7 }}
        run: |
          NOTES_FILE="notes_${{ steps.version.outputs.NEXT }}.tmp"
          : > "$NOTES_FILE"
          for n in "$N1" "$N2" "$N3" "$N4" "$N5" "$N6" "$N7"; do
            # trim whitespaces
            line="$(printf '%s' "$n" | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//')"
            [[ -z "$line" ]] && continue
            # normalise bullet point markers
            line="$(printf '%s' "$line" | sed -e 's/^-\+[[:space:]]*//')"
            [[ -z "$line" ]] && continue
            printf -- '- %s\n' "$line" >> "$NOTES_FILE"
          done
          # output multi-line notes for PR body steps
          {
            echo "NOTES<<__NOTES_EOF__"
            cat "$NOTES_FILE"
            echo "__NOTES_EOF__"
          } >> "$GITHUB_OUTPUT"
          echo "Assembled release notes:"
          cat "$NOTES_FILE"

      - name: Update CHANGELOG (does nothing, if empty)
        run: |
          python .scripts/furc_utils.py update_changelog \
            --notes-file "notes_${{ steps.version.outputs.NEXT }}.tmp" \
            --changelog-file CHANGELOG \
            --header "${{ steps.version.outputs.NEXT }} ($(date --iso-8601))"

      - name: Regenerate autocomplete defs (XML + strings)
        run: |
          LUADOC_DEFINITIONS="docs/autocomplete_definitions.lua"
          python .scripts/luaDoc_generateStr.py locale/en.lua
          python .scripts/luaDoc_generateStr.py LibFurnitureCatalogue/locale/en.lua
          python .scripts/luaDoc_generateGui.py xml/FurnitureCatalogue.xml "$LUADOC_DEFINITIONS"
          python .scripts/luaDoc_generateGui.py FurnitureCatalogue_DevUtility/xml.xml "$LUADOC_DEFINITIONS"

      - name: Regenerate translation files
        run: |
          for langfile in locale/*.lua; do
            if [[ "$langfile" != "locale/en.lua" ]]; then
              python .scripts/luaDoc_generateStr.py locale/en.lua "$langfile" --generate-translation
            fi
          done
          for langfile in LibFurnitureCatalogue/locale/*.lua; do
            if [[ "$langfile" != "LibFurnitureCatalogue/locale/en.lua" ]]; then
              python .scripts/luaDoc_generateStr.py LibFurnitureCatalogue/locale/en.lua "$langfile" --generate-translation
            fi
          done

      - name: Format with StyLUA
        run: ~/.cache/bins/stylua --config-path=stylua.toml .

      # ----- Decision fork ----------
      # dry-run?  -> artifact + summary
      # real-run? -> commit + PR
      # ------------------------------

      - name: Capture diff for summary + artifact
        id: diff
        run: |
          git add -A
          # Stage everything under release-preview/ so the uploaded zip has a
          # flat structure (upload-artifact keeps the FS layout of absolute paths).
          rm -rf release-preview && mkdir release-preview
          git diff --cached --stat > release-preview/release_diff.stat
          git diff --cached > release-preview/release_diff.patch
          cp FurnitureCatalogue.txt CHANGELOG release-preview/
          {
            echo "## Release preview: ${{ steps.version.outputs.NEXT }}"
            echo ""
            echo "_Live ESOUI version: ${{ steps.version.outputs.LIVE }}_"
            echo "_Impact: ${{ inputs.impact }}_"
            echo "_Dry run: ${{ inputs.dry_run }}_"
            echo ""
            echo "### Files changed"
            echo '```'
            cat release-preview/release_diff.stat
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload dry-run artifact
        if: ${{ inputs.dry_run }}
        uses: actions/upload-artifact@v7
        with:
          name: release-preview-${{ steps.version.outputs.NEXT }}
          path: release-preview/

      - name: Dry-run summary - stop here
        if: ${{ inputs.dry_run }}
        run: |
          ARTIFACT_NAME="release-preview-${{ steps.version.outputs.NEXT }}"
          {
            echo ""
            echo "### ✅ Dry run complete for ${{ steps.version.outputs.NEXT }}"
            echo ""
            echo "Nothing pushed."
            echo ""
            echo "The full diff + bumped \`FurnitureCatalogue.txt\` + new top of"
            echo "\`CHANGELOG\` are attached to this run as the **\`$ARTIFACT_NAME\`**"
            echo "artifact: see the **Artifacts** section at bottom of this run page"
            echo "(right under this summary)"
            echo ""
            echo "#### Apply patch locally (preview in your editor, or test in-game)"
            echo ""
            echo "1. Download \`$ARTIFACT_NAME.zip\` from Artifacts section above and unzip (the artifact). Contains \`release_diff.patch\`."
            echo "2. In your local repo (checked out on \`master\`):"
            echo ""
            echo '   ```bash'
            echo "   git checkout -b release/${{ steps.version.outputs.NEXT }}-preview"
            echo "   git apply /path/to/release_diff.patch"
            echo '   ```'
            echo ""
            echo "Your working tree now matches what PrepareRelease would commit."
            echo "Open the changed files in your editor, or copy the repo into your"
            echo "live AddOns dir and \`/reloadui\` to test in-game."
            echo ""
            echo "To roll back: \`git restore .\` (drops the unstaged patch), then"
            echo "\`git checkout master && git branch -D release/${{ steps.version.outputs.NEXT }}-preview\`."
            echo ""
            echo "Re-run with **dry_run=false** to commit + open the release PR."
          } >> "$GITHUB_STEP_SUMMARY"

      # ----- Real run ----------
      # commit, push, open PR
      # -------------------------

      # Multiple commit stages so we can identify fails easier
      # PR will squash on merge anyway
      - name: Commit changes
        if: ${{ !inputs.dry_run }}
        env:
          CHANGED_FILES: ${{ steps.bump.outputs.CHANGED_FILES }}
          VERSION: ${{ steps.version.outputs.NEXT }}
        run: |
          # Reset the all-in-one staging done for diff capture; redo in stages.
          git reset

          # 1. Version bumps (manifest + startup.lua)
          while read -r LINE; do
            [[ -n "$LINE" ]] && git add "$LINE"
          done < "$CHANGED_FILES"
          git commit -m "Version bumps for $VERSION"

          # 2. CHANGELOG (optional, notes can be empty)
          git add CHANGELOG 2>/dev/null || true
          git commit -m "CHANGELOG for $VERSION" 2>/dev/null || true

          # 3. Translations
          git add 'locale/*.lua' 2>/dev/null || true
          git commit -m "Update translations for $VERSION" 2>/dev/null || true

          # 4. luaDoc autocomplete.
          git add 'docs/*.lua' 2>/dev/null || true
          git commit -m "Update luaDoc for $VERSION" 2>/dev/null || true

          # 5. stylua reformatting (can result in 0 changes)
          git add '*.lua' '**/*.lua' 2>/dev/null || true
          git commit -m "Format LUA files with StyLUA" 2>/dev/null || true

          # Cleanup tmp files so they don't get added.
          rm -f "$CHANGED_FILES" "notes_${VERSION}.tmp"

      - name: Push release branch
        if: ${{ !inputs.dry_run }}
        run: git push --set-upstream origin "${{ steps.branch.outputs.BRANCH }}"

      - name: Open release PR
        if: ${{ !inputs.dry_run }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NOTES: ${{ steps.notes.outputs.NOTES }}
        run: |
          VERSION="${{ steps.version.outputs.NEXT }}"
          BODY_FILE="$(mktemp)"
          {
            echo "## Release $VERSION"
            echo ""
            echo "_Triggered by: @${{ github.actor }} - impact: \`${{ inputs.impact }}\`_"
            echo ""
            if [[ -n "$NOTES" ]]; then
              echo "### Release notes"
              echo ""
              echo "$NOTES"
            else
              echo "_No CHANGELOG entry this release._"
            fi
            echo ""
            echo "---"
            echo "Merging this PR will trigger **FinalizeRelease**, which tags \`$VERSION\`, creates GitHub release, and auto-publishes to ESOUI. If upload fails, existing zip can be used for manual re-run or just hand-upload it"
          } > "$BODY_FILE"

          gh pr create \
            --title "Release $VERSION" \
            --head "${{ steps.branch.outputs.BRANCH }}" \
            --base master \
            --body-file "$BODY_FILE" \
            --no-maintainer-edit
