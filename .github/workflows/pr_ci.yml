name: PRChecks

# PR can still merge if a job fails, but the red X is visible.
# Branch protection on master can be set to make it blocking.
# PrepareRelease also runs this at release time. Running on PRs just catches problems earlier.

permissions:
  contents: read

on:
  pull_request:
    branches: [dev, master]

jobs:
  stylua-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: StyLua check
        uses: ./.github/actions/run-stylua
        with:
          mode: check

  manifest-validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - uses: ./.github/actions/setup-python-env
      - name: Parse manifest
      # TODO: if change from "*.txt" to "*.addon", change here too
        run: python .scripts/furc_utils.py validatemanifest FurnitureCatalogue.txt

  package-dryrun:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - uses: ./.github/actions/setup-python-env
      - name: Build zip and list contents
        run: |
          python .scripts/package.py
          ZIP="$(ls -1 *.zip | head -1)"
          {
            echo "## Package contents (\`$ZIP\`)"
            echo ""
            echo '```'
            unzip -l "$ZIP"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
