name: PublishToESOUI

# Connected workflows are:
# 1. PrepareRelease      - prepare_release.yml
# 2. FinalizeRelease     - finalize_release.yml
# 3. 📍PublishToESOUI    - publish_to_esoui.yml
# Refer to CONTRIBUTING.md for more info.

# Standalone manual upload. Publishes release zip to ESOUI. If upload fails, GitHub release still exists and you can re-run this workflow or upload the zip by hand. No re-packaging needed.

permissions:
  contents: read

on:
  workflow_dispatch:
    inputs:
      print_response:
        description: 'Full ESOUI response 4 debug.'
        type: boolean
        default: false

jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (for .scripts/)
        uses: actions/checkout@v6

      - uses: ./.github/actions/setup-python-env

      # Always publish latest GitHub release
      - name: Resolve latest release
        id: tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="$(gh release list --limit 10 | python .scripts/furc_utils.py getlatest)"
          ARCHIVE_URL="$(gh release view "$TAG" --json assets --jq '.assets[0].url')"
          test -n "$ARCHIVE_URL" || { echo "🔥 Release $TAG has no asset attached" >&2; exit 1; }
          echo "TAG=$TAG" >> "$GITHUB_OUTPUT"
          echo "ARCHIVE_URL=$ARCHIVE_URL" >> "$GITHUB_OUTPUT"

      # Manifest must match release tag
      - name: Check manifest matches tag
        run: |
          MANIFEST_VERSION="$(python .scripts/furc_utils.py manifestversion FurnitureCatalogue.txt)"
          TAG="${{ steps.tag.outputs.TAG }}"
          if [[ "$MANIFEST_VERSION" != "$TAG" ]]; then
            echo "🔥 Manifest version ($MANIFEST_VERSION) does not match release tag ($TAG)." >&2
            echo "🔥 The repo is probably not checked out at the release commit. Aborting." >&2
            exit 1
          fi

      # New version must be higher than live one. We check it here so we don't spam ESOUI with missclicks
      - name: Upload to ESOUI
        env:
          ESOUI_API_TOKEN: ${{ secrets.ESOUI_API_TOKEN }}
        run: |
          ARGS=( --changelog-max-entries 15 --archive-file "${{ steps.tag.outputs.ARCHIVE_URL }}" )
          if [[ "${{ inputs.print_response }}" == "true" ]]; then
            ARGS+=( --print-response )
          fi
          python .scripts/publish.py "${ARGS[@]}"
          {
            echo "## ✅ Uploaded ${{ steps.tag.outputs.TAG }} to ESOUI"
            echo ""
            echo "Asset source: ${{ steps.tag.outputs.ARCHIVE_URL }}"
          } >> "$GITHUB_STEP_SUMMARY"
