name: Setup StyLUA
description: Installs StyLUA binary into ~/.cache/bins, with caching. Pinned version for stability and compatibility

inputs:
  version:
    description: StyLUA release tag (like 0.20.0)
    required: false
    default: "2.5.0"

runs:
  using: composite
  steps:
    - name: Cache StyLUA binary
      id: cache_stylua
      uses: actions/cache@v5
      with:
        path: ~/.cache/bins
        key: stylua-v${{ inputs.version }}-${{ runner.os }}
    - name: Download StyLUA (only when not in cache)
      if: steps.cache_stylua.outputs.cache-hit != 'true'
      shell: bash
      env:
        STYLUA_VERSION: ${{ inputs.version }}
      run: |
        mkdir -p ~/.cache/bins
        curl -L -o /tmp/stylua.zip \
          "https://github.com/JohnnyMorganz/StyLua/releases/download/v${STYLUA_VERSION}/stylua-linux.zip"
        unzip /tmp/stylua.zip -d ~/.cache/bins
        rm -f /tmp/stylua.zip
        chmod +x ~/.cache/bins/stylua
    # reapply executability, in case cache restore drops it
    - name: Restore exec bit
      shell: bash
      run: chmod +x ~/.cache/bins/stylua
