name: Setup StyLUA
description: Installs StyLUA into ~/.cache/bins

runs:
  using: composite
  steps:
    - name: Cache StyLUA binary
      id: cache_stylua
      uses: actions/cache@v5
      with:
        path: ~/.cache/bins
        key: stylua-v2.5.0-${{ runner.os }}
    - name: Download StyLUA (only when not in cache)
      if: steps.cache_stylua.outputs.cache-hit != 'true'
      shell: bash
      env:
        STYLUA_VERSION: "2.5.0"
      run: |
        mkdir -p ~/.cache/bins
        curl -L -o /tmp/stylua.zip \
          "https://github.com/JohnnyMorganz/StyLua/releases/download/v${STYLUA_VERSION}/stylua-linux-x86_64.zip"
        unzip /tmp/stylua.zip -d ~/.cache/bins
        rm -f /tmp/stylua.zip
        chmod +x ~/.cache/bins/stylua
    # reapply executability, in case cache restore drops it
    - name: Restore exec bit
      shell: bash
      run: chmod +x ~/.cache/bins/stylua
